services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: CLAWDBOT_GATEWAY_PORT
        value: "8080"
      - key: CLAWDBOT_GATEWAY_BIND
        value: "0.0.0.0"
      - key: SETUP_PASSWORD
        sync: false
