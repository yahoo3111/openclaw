services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /healthz
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_BIND
        value: "lan"
      - key: OPENCLAW_HEADLESS
        value: "true"
      - key: SETUP_PASSWORD
        sync: false
