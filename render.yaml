services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      - key: SETUP_PASSWORD
        value: "your-password-123"
      - key: OPENCLAW_HEADLESS
        value: "true"
